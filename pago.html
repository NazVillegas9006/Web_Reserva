<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago - Butterfly Garden</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/pago.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-verde-boton border-bottom border-success">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/Logo.png" alt="Logo" width="50" class="me-2 rounded-circle">
        <span class="fw-bold text-white">La Fortuna Butterfly Garden</span>
      </a>
    </div>
  </nav>

  <main class="container my-5">
    <div class="pago-card card shadow-sm p-4">
      <h3 id="tituloPago" data-i18n="tituloPago">RESERVACIÓN #00000</h3>
      <p><strong data-i18n="datosReserva">Tus reservas:</strong></p>
      <div id="infoReserva"></div>
      <hr>

      <form id="formPago" novalidate>
        <div class="mb-3">
          <label class="form-label" data-i18n="numTarjeta">Card Number</label>
          <input type="text" id="cardNumber" class="form-control" placeholder="•••• •••• •••• ••••">
          <div class="invalid-feedback" id="errCard">Número de tarjeta inválido</div>
        </div>
        <div class="mb-3">
          <label class="form-label" data-i18n="direccion">Address</label>
          <input type="text" id="address" class="form-control">
          <div class="invalid-feedback" id="errAddress">Debe llenar la dirección</div>
        </div>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" data-i18n="cvc">CVC</label>
            <input type="text" id="cvc" class="form-control" placeholder="ex. 311">
            <div class="invalid-feedback" id="errCvc">CVC inválido</div>
          </div>
          <div class="col-md-6">
            <label class="form-label" data-i18n="expDate">Expiration Date</label>
            <div class="d-flex">
              <select id="expMonth" class="form-select me-2"></select>
              <select id="expYear" class="form-select"></select>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100" id="btnPay" data-i18n="btnPay">Pay $0 USD »</button>
      </form>
    </div>
  </main>

  <footer class="bg-verde-boton text-white py-4">
    <div class="container text-center">
      <img src="assets/img/Logo.png" alt="Logo Footer" width="60" class="mb-2 rounded-circle">
      <h5 class="mt-2">La Fortuna Butterfly Garden</h5>
      <p class="mb-0">Connect with Us and Explore</p>
      <p class="mb-0" data-i18n="contactanos">Contáctanos</p>
      <p class="mb-0">butter.fly@gmail.com</p>
      <p>8888 8888</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pago.js"></script>
</body>
</html>
