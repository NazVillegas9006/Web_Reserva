<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago - Mariposario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/variables.css" rel="stylesheet"/>
  <link href="css/pago.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container my-5">
    <div class="pago-card card shadow-sm p-4">
      <h3 id="tituloPago" data-i18n="tituloPago">RESERVACIÓN #00000</h3>
      <p><strong data-i18n="datosReserva">Tus reservas:</strong></p>
      <div id="infoReserva"></div>
      <hr>

      <form id="formPago" novalidate>
        <div class="mb-3">
          <label class="form-label" data-i18n="numTarjeta">Card Number</label>
          <input type="text" id="cardNumber" class="form-control" placeholder="•••• •••• •••• ••••">
          <div class="invalid-feedback" id="errCard">Número de tarjeta inválido</div>
        </div>
        <div class="mb-3">
          <label class="form-label" data-i18n="direccion">Address</label>
          <input type="text" id="address" class="form-control">
          <div class="invalid-feedback" id="errAddress">Debe llenar la dirección</div>
        </div>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" data-i18n="cvc">CVC</label>
            <input type="text" id="cvc" class="form-control" placeholder="ex. 311">
            <div class="invalid-feedback" id="errCvc">CVC inválido</div>
          </div>
          <div class="col-md-6">
            <label class="form-label" data-i18n="expDate">Expiration Date</label>
            <div class="d-flex">
              <select id="expMonth" class="form-select me-2"></select>
              <select id="expYear" class="form-select"></select>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100" id="btnPay" data-i18n="btnPay">Pay $0 USD »</button>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="node_modules/i18next/dist/umd/i18next.min.js"></script>
  <script src="node_modules/i18next-http-backend/i18nextHttpBackend.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pago.js"></script>
</body>
</html>
