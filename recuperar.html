<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Mariposario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/recuperar.css">
  <style>
    .bg-verde-boton {
      background-color: var(--color-primary) !important;
    }
    footer img {
      width: 60px;
      border-radius: 50%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- FORMULARIO -->
  <div class="recuperar-container">
    <div class="recuperar-card">
      <form id="recuperarForm" class="p-4">
        <div class="text-center mb-3">
          <img src="assets/img/Logo.png" width="40" alt="logo">
          <h4>Restablecer Contraseña</h4>
          <p>Ingrese su correo y una nueva contraseña segura</p>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" required>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">Nueva contraseña</label>
          <input type="password" class="form-control" id="newPassword" required>
          <small class="text-muted d-block mt-1">
            La contraseña debe tener al menos 6 caracteres, incluir letras y números.
          </small>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmPassword" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Actualizar contraseña</button>

        <div class="text-center mt-3">
          <a href="login.html">Volver al inicio de sesión</a>
        </div>
      </form>
    </div>
  </div>

  <!-- FOOTER UNIFICADO -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script src="js/components.js"></script>
  <script src="js/recuperar.js"></script>
</body>
</html>
