<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galería - Mariposario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/galeria.css" />
</head>
<body>
  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>


  <!-- HEADER SECTION -->
  <section class="gallery-header py-5 bg-light text-center">
    <div class="container py-4">
      <h1 class="fw-bold" style="color: var(--color-primary) !important;" data-i18n="galeria.titulo">Galería Fotográfica</h1>
      <p class="text-muted mb-0" data-i18n="galeria.subtitulo">Explora la belleza de nuestras especies de mariposas</p>
    </div>
  </section>

  <!-- GALLERY GRID -->
  <section class="gallery-section py-5 bg-white">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Azul.jpg" alt="Blue Morpho" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.morphoAzul">Morpho Azul</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Zul.jpg" alt="Hecale Longwing" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.hecale">Hecale Longwing</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Mariposa.webp" alt="Monarch" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.monarca">Monarca</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Bute.jpg" alt="Zebra Longwing" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.cebra">Cebra Heliconiana</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Mii.jpg" alt="Malachite" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.malaquita">Malaquita</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Chi.webp" alt="Postman" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.cartero">Cartero</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Chica.webp" alt="Owl Butterfly" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.buho">Ojo de Búho</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Moo.jpg" alt="Glasswing" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.espejito">Espejito</span>
          </div>
        </div>
        <div class="gallery-item rounded-3 overflow-hidden">
          <img src="assets/img/Cali.jpg" alt="Julia Heliconian" loading="lazy">
          <div class="species-overlay">
            <span data-i18n="especie.flambeau">Flambeau</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="node_modules/i18next/dist/umd/i18next.min.js"></script>
  <script src="node_modules/i18next-http-backend/i18nextHttpBackend.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/session.js"></script>
</body>
</html>
