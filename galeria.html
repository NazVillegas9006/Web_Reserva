<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galería - Mariposario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/galeria.css" />
</head>
<body>
  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>


  <!-- HERO SECTION -->
  <section class="hero-image">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="bg-light text-dark p-4 rounded shadow-lg bg-opacity-75 mt-5 text-center">
            <h2 class="fw-bold" data-i18n="galeriaTitulo">GALERÍA FOTOGRÁFICA</h2>
            <p data-i18n="descripcionGaleria">Explora algunos de los momentos más mágicos dentro del mariposario. Descubre la belleza de nuestras especies tropicales en todo su esplendor.</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- GALERÍA IMÁGENES -->
  <div class="container gallery-grid py-5">
    <div class="row g-3">
      <div class="col-6 col-md-4"><img src="assets/img/Azul.jpg" class="img-fluid rounded shadow" alt="Azul"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Zul.jpg" class="img-fluid rounded shadow" alt="Zul"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Mariposa.webp" class="img-fluid rounded shadow" alt="Garden"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Bute.jpg" class="img-fluid rounded shadow" alt="Bute"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Mii.jpg" class="img-fluid rounded shadow" alt="Libro"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Chi.webp" class="img-fluid rounded shadow" alt="Naranja"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Chica.webp" class="img-fluid rounded shadow" alt="Ojo"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Moo.jpg" class="img-fluid rounded shadow" alt="Fruta"></div>
      <div class="col-6 col-md-4"><img src="assets/img/Cali.jpg" class="img-fluid rounded shadow" alt="Personas"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const traducciones = {
      es: {
        inicio: "Inicio",
        galeria: "Galería",
        reserva: "Reserva",
        ayuda: "Ayuda",
        galeriaTitulo: "GALERÍA FOTOGRÁFICA",
        descripcionGaleria: "Explora algunos de los momentos más mágicos dentro del mariposario. Descubre la belleza de nuestras especies tropicales en todo su esplendor.",
        contactanos: "Contáctanos"
      },
      en: {
        inicio: "Home",
        galeria: "Gallery",
        reserva: "Booking",
        ayuda: "Help",
        galeriaTitulo: "PHOTO GALLERY",
        descripcionGaleria: "Explore some of the most magical moments inside the butterfly garden. Discover the beauty of our tropical species in all their splendor.",
        contactanos: "Contact Us"
      }
    };

    const cambiarIdioma = idioma => {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const clave = el.getAttribute("data-i18n");
        el.innerHTML = traducciones[idioma][clave] || clave;
      });
      localStorage.setItem("idioma", idioma);
    };

    document.getElementById("languageSelector").addEventListener("change", e => {
      cambiarIdioma(e.target.value);
    });

    const idiomaGuardado = localStorage.getItem("idioma") || "es";
    document.getElementById("languageSelector").value = idiomaGuardado;
    cambiarIdioma(idiomaGuardado);
  </script>
  <script src="js/session.js"></script>
</body>
</html>
