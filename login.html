<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - La Fortuna Butterfly Garden</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/Logo.png" alt="Logo" width="50" class="me-2 rounded-circle">
        <span class="fw-bold text-white">La Fortuna Butterfly Garden</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><span data-i18n="inicio">Inicio</span></a></li>
          <li class="nav-item"><a class="nav-link" href="galeria.html"><span data-i18n="galeria">Galería</span></a></li>
          <li class="nav-item"><a class="nav-link active" href="#"><span data-i18n="reserva">Reserva</span></a></li>
          <li class="nav-item"><a class="nav-link" href="#"><span data-i18n="ayuda">Ayuda</span></a></li>
        </ul>
        <div class="language-switcher ms-3">
          <select id="languageSelector" class="form-select form-select-sm">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <form id="loginForm" class="p-4">
        <div class="text-center mb-3">
          <img src="assets/img/Logo.png" width="40" alt="logo">
          <h4><span data-i18n="bienvenida">¡Bienvenido!</span></h4>
          <p class="text-center" data-i18n="subtitulo">Ingresa tus credenciales para continuar</p>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label"><span data-i18n="email">Correo</span></label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label"><span data-i18n="password">Contraseña</span></label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" id="remember" class="form-check-input">
            <label for="remember" class="form-check-label" data-i18n="recordarme">Recordarme</label>
          </div>
          <a href="recuperar.html" class="text-decoration-none" data-i18n="olvide">¿Olvidó su contraseña?</a>
        </div>

        <div class="text-center mb-3">
          <a href="registro.html" class="text-decoration-none">Registrarse</a>
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-2" data-i18n="iniciar">Iniciar sesión</button>
      </form>
    </div>
    <div class="login-image">
      <img src="assets/img/Login.jpg" alt="Mariposa Morpho" />
    </div>
  </div>

  <footer>
    <div class="container text-center text-white">
      <img src="assets/img/Logo.png" width="60" class="mb-2">
      <h5 class="mb-0">La Fortuna Butterfly Garden</h5>
      <p class="mb-0">Connect with Us and Explore</p>
      <p class="mb-0" data-i18n="contactanos">Contáctanos</p>
      <p class="mb-0">butter.fly@gmail.com</p>
      <p>2098 6714</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script> <script src="js/login.js"></script>
  <script src="js/session.js"></script>
</body>
</html>
</html>
