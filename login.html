<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Mariposario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="login-container">
    <div class="login-card">
      <form id="loginForm" class="p-4">
        <div class="text-center mb-3">
          <img src="assets/img/Logo.png" width="40" alt="logo">
          <h4><span data-i18n="bienvenida">¡Bienvenido!</span></h4>
          <p class="text-center" data-i18n="subtitulo">Ingresa tus credenciales para continuar</p>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label"><span data-i18n="email">Correo</span></label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label"><span data-i18n="password">Contraseña</span></label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" id="remember" class="form-check-input">
            <label for="remember" class="form-check-label" data-i18n="recordarme">Recordarme</label>
          </div>
          <a href="recuperar.html" class="text-decoration-none" data-i18n="olvide">¿Olvidó su contraseña?</a>
        </div>

        <div class="text-center mb-3">
          <a href="registro.html" class="text-decoration-none">Registrarse</a>
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-2" data-i18n="iniciar">Iniciar sesión</button>
      </form>
    </div>
    <div class="login-image">
      <img src="assets/img/Login.jpg" alt="Mariposa Morpho" />
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="node_modules/i18next/dist/umd/i18next.min.js"></script>
  <script src="node_modules/i18next-http-backend/i18nextHttpBackend.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/session.js"></script>
</body>
</html>
