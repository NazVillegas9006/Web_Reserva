<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - La Fortuna Butterfly Garden</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/img/Logo.png" alt="Logo" width="50" class="me-2 rounded-circle">
        <span class="fw-bold text-white">La Fortuna Butterfly Garden</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="inicio">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="galeria.html" data-i18n="galeria">Galería</a></li>
          <li class="nav-item"><a class="nav-link" href="reserva.html" data-i18n="reserva">Reserva</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-i18n="ayuda">Ayuda</a></li>
        </ul>
        <div class="d-flex align-items-center ms-3">
          <div class="language-switcher ms-3">
            <select id="languageSelector" class="form-select form-select-sm">
              <option value="es">Español</option>
              <option value="en">English</option>
            </select>
          </div>
          <a href="login.html" class="btn btn-outline-light ms-3">Iniciar sesión</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- FORMULARIO DE REGISTRO -->
  <div class="login-container">
    <div class="login-card">
      <form id="registroForm" class="p-4" autocomplete="off">
        <div id="mensajeError" class="alert alert-danger d-none" role="alert"></div>

        <div class="text-center mb-3">
          <img src="assets/img/Logo.png" width="40" alt="logo">
          <h4>Crear cuenta</h4>
          <p>Rellena los campos para registrarte</p>
        </div>

        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="nombre" required>
        </div>

        <div class="mb-3">
          <label for="correo" class="form-label">Correo</label>
          <input type="email" class="form-control" id="correo" required>
        </div>

        <div class="mb-3">
          <label for="contrasena" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="contrasena" required>
          <small class="text-muted d-block mt-1">
            La contraseña debe tener al menos 6 caracteres, incluir letras y números.
          </small>
        </div>

        <div class="mb-3">
          <label for="pais" class="form-label">País de Procedencia</label>
          <input type="text" class="form-control" id="pais" list="sugerencias-pais" required>
          <datalist id="sugerencias-pais"></datalist>
        </div>

        <!-- CAMPO OCULTO PARA NACIONALIDAD -->
        <input type="hidden" id="nacionalidad" name="nacionalidad">

        <button type="submit" class="btn btn-dark w-100">Registrarse</button>
      </form>
    </div>

    <div class="login-image">
      <img src="assets/img/Login.jpg" alt="Mariposa Morpho" />
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container text-center text-white">
      <img src="assets/img/Logo.png" width="60" class="mb-2">
      <h5 class="mb-0">La Fortuna Butterfly Garden</h5>
      <p>Contáctanos: butter.fly@gmail.com | 2098 6714</p>
    </div>
  </footer>

  <script src="js/registro.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/session.js"></script>

  <!-- LÓGICA DE DETECCIÓN DE NACIONALIDAD -->
  <script>
    const paisInput = document.getElementById("pais");
    const nacionalidadInput = document.getElementById("nacionalidad");

    paisInput.addEventListener("input", () => {
      const pais = paisInput.value.trim().toLowerCase();
      nacionalidadInput.value = pais === "costa rica" ? "nacional" : "extranjero";
    });
  </script>
</body>
</html>
